name = "qahal-worker"
main = "src/index.ts"
compatibility_date = "2026-04-19"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "qahal-db-test"
database_id = "REPLACE_WITH_D1_DATABASE_ID_TEST"
migrations_dir = "migrations"

[vars]
# Comma-separated list, for example:
# CORS_ALLOWED_ORIGINS = "https://development.qahal.xyz,https://app.qahal.xyz"
CORS_ALLOWED_ORIGINS = "https://development.qahal.xyz,https://app.qahal.xyz"
APP_ENV = "development"

[env.production.vars]
APP_ENV = "production"

[env.production]
name = "qahal-worker-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "qahal-db-prod"
database_id = "REPLACE_WITH_D1_DATABASE_ID_PROD"
migrations_dir = "migrations"
